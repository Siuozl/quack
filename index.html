<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🦆 QUACK INVASION</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --yellow: #FFD600;
      --orange: #FF8C00;
      --dark: #1a1200;
      --darker: #0d0900;
      --card: #1f1800;
      --accent: #ffe066;
      --white: #fff8e1;
      --muted: #b8a060;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--darker);
      color: var(--white);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 3rem;
      overflow-x: hidden;
      position: relative;
    }

    /* animated background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(255,214,0,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%, rgba(255,140,0,0.06) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .floaters {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .floater {
      position: absolute;
      font-size: 2rem;
      opacity: 0;
      animation: floatUp linear infinite;
    }

    @keyframes floatUp {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.18; }
      90%  { opacity: 0.12; }
      100% { transform: translateY(-10vh) rotate(25deg); opacity: 0; }
    }

    /* ---- Main content ---- */
    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      max-width: 600px;
      width: 100%;
    }

    /* Header */
    .header {
      text-align: center;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.6) translateY(30px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .duck-emoji {
      font-size: 5rem;
      display: block;
      animation: waddle 1.8s ease-in-out infinite;
      filter: drop-shadow(0 0 20px rgba(255,214,0,0.5));
    }

    @keyframes waddle {
      0%, 100% { transform: rotate(-8deg) translateY(0); }
      50%       { transform: rotate(8deg) translateY(-8px); }
    }

    .title {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.8rem, 8vw, 4.5rem);
      color: var(--yellow);
      text-shadow:
        0 0 30px rgba(255,214,0,0.4),
        3px 3px 0 var(--orange),
        6px 6px 0 rgba(255,140,0,0.3);
      line-height: 1.05;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 0.4rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    /* Counter card */
    .counter-card {
      background: var(--card);
      border: 2px solid rgba(255,214,0,0.15);
      border-radius: 24px;
      padding: 2.5rem 3rem;
      width: 100%;
      text-align: center;
      box-shadow:
        0 0 0 1px rgba(255,214,0,0.05),
        0 20px 60px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,214,0,0.1);
      animation: popIn 0.6s 0.15s cubic-bezier(0.34,1.56,0.64,1) both;
      position: relative;
      overflow: hidden;
    }

    .counter-card::before {
      content: '';
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--yellow), transparent);
      opacity: 0.4;
    }

    .counter-label {
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .counter-number {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(5rem, 18vw, 9rem);
      color: var(--yellow);
      line-height: 1;
      text-shadow:
        0 0 40px rgba(255,214,0,0.35),
        0 0 80px rgba(255,214,0,0.15);
      transition: transform 0.15s cubic-bezier(0.34,1.56,0.64,1);
    }

    .counter-number.bump {
      transform: scale(1.12);
    }

    .counter-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.4rem;
      font-weight: 700;
    }

    /* Status badge */
    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 1rem;
      border-radius: 999px;
      font-size: 0.8rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 1.2rem;
      transition: all 0.4s;
    }

    .status-badge.loading {
      background: rgba(255,214,0,0.08);
      color: var(--muted);
      border: 1px solid rgba(255,214,0,0.15);
    }

    .status-badge.new-duck {
      background: rgba(255,214,0,0.15);
      color: var(--yellow);
      border: 1px solid rgba(255,214,0,0.4);
      animation: glow 1.5s ease-in-out infinite alternate;
    }

    .status-badge.returning {
      background: rgba(255,140,0,0.1);
      color: var(--orange);
      border: 1px solid rgba(255,140,0,0.3);
    }

    @keyframes glow {
      from { box-shadow: 0 0 5px rgba(255,214,0,0.2); }
      to   { box-shadow: 0 0 18px rgba(255,214,0,0.5); }
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.2s ease-in-out infinite;
    }

    .status-badge.loading .dot { animation: none; opacity: 0.4; }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.6); }
    }

    /* Splash overlay for new ducks */
    .splash {
      position: fixed;
      inset: 0;
      background: rgba(255,214,0,0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .splash.show {
      opacity: 1;
      pointer-events: all;
      animation: splashAnim 1.8s ease forwards;
    }

    @keyframes splashAnim {
      0%   { opacity: 0; }
      15%  { opacity: 1; }
      70%  { opacity: 1; }
      100% { opacity: 0; pointer-events: none; }
    }

    .splash-emoji { font-size: 8rem; animation: spin 0.6s ease; }
    @keyframes spin { from { transform: rotate(-20deg) scale(0.5); } to { transform: rotate(0deg) scale(1); } }
    .splash-text {
      font-family: 'Fredoka One', cursive;
      font-size: 3rem;
      color: var(--dark);
      margin-top: 0.5rem;
      text-align: center;
    }
    .splash-sub { font-size: 1.1rem; color: var(--dark); opacity: 0.7; font-weight: 700; margin-top: 0.3rem; }

    /* Message box */
    .message-card {
      background: var(--card);
      border: 2px solid rgba(255,214,0,0.12);
      border-radius: 20px;
      padding: 1.8rem;
      width: 100%;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      animation: popIn 0.6s 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }

    .message-title {
      font-size: 0.75rem;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .message-box {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,214,0,0.1);
      border-radius: 12px;
      padding: 1.2rem 1.4rem;
      font-family: 'Nunito', monospace;
      font-size: 0.92rem;
      line-height: 1.7;
      color: var(--accent);
      white-space: pre-wrap;
      word-break: break-word;
      user-select: all;
    }

    .copy-btn {
      margin-top: 1rem;
      width: 100%;
      padding: 1rem;
      background: var(--yellow);
      color: var(--dark);
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: transform 0.15s, box-shadow 0.15s, background 0.2s;
      box-shadow: 0 4px 0 var(--orange), 0 8px 20px rgba(255,214,0,0.2);
      position: relative;
      top: 0;
    }

    .copy-btn:hover {
      background: var(--accent);
      transform: translateY(-2px);
      box-shadow: 0 6px 0 var(--orange), 0 12px 30px rgba(255,214,0,0.3);
    }

    .copy-btn:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 var(--orange), 0 4px 12px rgba(255,214,0,0.15);
      top: 2px;
    }

    .copy-btn.copied {
      background: #66cc66;
      box-shadow: 0 4px 0 #339933, 0 8px 20px rgba(102,204,102,0.25);
    }

    .footer {
      font-size: 0.72rem;
      color: rgba(184,160,96,0.4);
      text-align: center;
      letter-spacing: 0.05em;
      margin-top: 0.5rem;
      animation: popIn 0.6s 0.45s both;
    }

    /* Homepage button */
    .top-bar {
      display: flex;
      justify-content: center;
      padding: 0.75rem 1rem 0;
      width: 100%;
    }

    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 1.2rem;
      background: rgba(255,214,0,0.08);
      border: 1px solid rgba(255,214,0,0.25);
      border-radius: 999px;
      color: var(--muted);
      font-family: 'Nunito', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      letter-spacing: 0.06em;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, border-color 0.2s, transform 0.15s;
    }

    .home-btn:hover {
      background: rgba(255,214,0,0.15);
      border-color: rgba(255,214,0,0.5);
      color: var(--yellow);
      transform: translateY(-1px);
    }

    .home-btn svg {
      width: 13px; height: 13px;
      fill: currentColor;
      flex-shrink: 0;
    }

    /* instruction text */
    .instruction-text {
      font-size: 1rem;
      font-weight: 900;
      color: var(--white);
      text-align: center;
      line-height: 1.4;
      margin-bottom: 0.2rem;
    }

    .instruction-text span {
      color: var(--yellow);
    }
  </style>
</head>
<body>

  <!-- Floating duck background -->
  <div class="floaters" id="floaters"></div>

  <!-- New duck splash screen -->
  <div class="splash" id="splash">
    <span class="splash-emoji">🦆</span>
    <div class="splash-text">QUACKED!</div>
    <div class="splash-sub">You've joined the flock</div>
  </div>

  <div class="container">
    <!-- Homepage button -->
    <div class="top-bar">
      <a class="home-btn" href="https://siuozl.github.io" target="_blank">
        <svg viewBox="0 0 20 20"><path d="M10 2L2 9h2v9h5v-5h2v5h5V9h2L10 2z"/></svg>
        Go to Homepage
      </a>
    </div>

    <div class="header">
      <span class="duck-emoji">🦆</span>
      <div class="title">QUACK<br>INVASION</div>
      <div class="subtitle">Global Duck Counter</div>
    </div>

    <div class="counter-card">
      <div class="counter-label">🦆 Ducks Quacked</div>
      <div class="counter-number" id="counter">—</div>
      <div class="counter-sub">and counting…</div>
      <div class="status-badge loading" id="statusBadge">
        <div class="dot"></div>
        <span id="statusText">Connecting to flock…</span>
      </div>
    </div>

    <div class="message-card">
      <div class="message-title">📋 Spread the Quack</div>
      <div class="instruction-text">If you've received this, you must send the following message to <span>10 FRIENDS!</span></div>
      <div class="message-box" id="messageBox"></div>
      <button class="copy-btn" id="copyBtn" onclick="copyMessage()">🦆 Copy Message</button>
    </div>

    <div class="footer">Device ID stored locally · No personal data collected</div>
  </div>

  <script>
    const DB_URL = 'https://duckies-c2be5-default-rtdb.firebaseio.com';
    const DEVICE_KEY = 'quack_device_id';
    const MESSAGE_TEXT = `# |—— QUACK INVASION ——|
**YOU'VE BEEN 🦆 QUACKED 🦆 !**
Open **[this link](https://siuozl.github.io/quack)** to add to the Quack Counter and follow the instructions on the page!
# |—— QUACK INVASION ——|`;

    // ---- Device ID ----
    function getOrCreateDeviceId() {
      let id = localStorage.getItem(DEVICE_KEY);
      if (!id) {
        id = 'duck_' + Date.now() + '_' + Math.random().toString(36).slice(2, 9);
        localStorage.setItem(DEVICE_KEY, id);
      }
      return id;
    }

    // ---- Floaters ----
    function spawnFloaters() {
      const container = document.getElementById('floaters');
      const emojis = ['🦆','🦆','🦆','🐥','🪶'];
      for (let i = 0; i < 14; i++) {
        const el = document.createElement('span');
        el.className = 'floater';
        el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        el.style.left = Math.random() * 100 + 'vw';
        el.style.fontSize = (1.2 + Math.random() * 1.8) + 'rem';
        el.style.animationDuration = (12 + Math.random() * 16) + 's';
        el.style.animationDelay = (Math.random() * 14) + 's';
        container.appendChild(el);
      }
    }

    // ---- Counter ----
    function bumpCounter(el) {
      el.classList.remove('bump');
      void el.offsetWidth;
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 300);
    }

    function setStatus(type, text) {
      const badge = document.getElementById('statusBadge');
      badge.className = 'status-badge ' + type;
      document.getElementById('statusText').textContent = text;
    }

    async function fetchCount() {
      const res = await fetch(`${DB_URL}/ducks.json`);
      const data = await res.json();
      return data ? Object.keys(data).length : 0;
    }

    async function registerDuck(deviceId) {
      // Check if this device is already registered
      const checkRes = await fetch(`${DB_URL}/ducks/${deviceId}.json`);
      const existing = await checkRes.json();

      if (existing) {
        return { isNew: false };
      }

      // Register
      await fetch(`${DB_URL}/ducks/${deviceId}.json`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ joinedAt: Date.now() })
      });

      return { isNew: true };
    }

    async function init() {
      spawnFloaters();
      document.getElementById('messageBox').textContent = MESSAGE_TEXT;

      const deviceId = getOrCreateDeviceId();

      try {
        const { isNew } = await registerDuck(deviceId);
        const count = await fetchCount();

        const counterEl = document.getElementById('counter');
        counterEl.textContent = count;
        bumpCounter(counterEl);

        if (isNew) {
          setStatus('new-duck', '🦆 You joined the flock!');
          document.getElementById('splash').classList.add('show');
          // Remove splash class after animation
          setTimeout(() => {
            document.getElementById('splash').classList.remove('show');
          }, 1800);
        } else {
          setStatus('returning', '👋 Welcome back, Duck #' + count);
        }

        // Live updates via polling
        setInterval(async () => {
          const c = await fetchCount();
          if (c !== parseInt(counterEl.textContent)) {
            counterEl.textContent = c;
            bumpCounter(counterEl);
          }
        }, 5000);

      } catch (e) {
        setStatus('loading', '⚠️ Couldn\'t reach the flock');
        document.getElementById('counter').textContent = '?';
        console.error(e);
      }
    }

    // ---- Copy ----
    function copyMessage() {
      const btn = document.getElementById('copyBtn');
      navigator.clipboard.writeText(MESSAGE_TEXT).then(() => {
        btn.textContent = '✅ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '🦆 Copy Message';
          btn.classList.remove('copied');
        }, 2000);
      }).catch(() => {
        // Fallback
        const ta = document.createElement('textarea');
        ta.value = MESSAGE_TEXT;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        btn.textContent = '✅ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = '🦆 Copy Message';
          btn.classList.remove('copied');
        }, 2000);
      });
    }

    init();
  </script>
</body>
</html>
